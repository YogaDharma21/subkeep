<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubKeep - Calendar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="header-title">Calendar</h1>
            <div class="header-actions">
                <button class="icon-btn" id="settingsBtn"><i class="fas fa-gear"></i></button>
                <button class="icon-btn" id="infoBtn"><i class="fas fa-circle-info"></i></button>
            </div>
        </header>

        <div class="main-content">
            <div class="calendar-container">
                <div class="calendar-header">
                    <h3 id="calendarMonth">July 2026</h3>
                    <div class="calendar-nav">
                        <button id="calPrev"><i class="fas fa-chevron-left"></i></button>
                        <button id="calNext"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="calendar-weekdays">
                    <div class="calendar-weekday">Sun</div>
                    <div class="calendar-weekday">Mon</div>
                    <div class="calendar-weekday">Tue</div>
                    <div class="calendar-weekday">Wed</div>
                    <div class="calendar-weekday">Thu</div>
                    <div class="calendar-weekday">Fri</div>
                    <div class="calendar-weekday">Sat</div>
                </div>
                <div class="calendar-days" id="calendarDays"></div>
            </div>

            <div class="day-detail" id="dayDetail" style="display: none;">
                <div class="day-detail-header">
                    <h3 id="dayDetailTitle">Subscriptions</h3>
                    <p id="dayDetailDate"></p>
                </div>
                <div class="day-detail-list" id="dayDetailList"></div>
            </div>
        </div>

        <nav class="bottom-bar">
            <a href="index.html" class="bottom-nav">
                <i class="fas fa-house"></i>
                <span>Home</span>
            </a>
            <a href="calendar.html" class="bottom-nav active">
                <i class="fas fa-calendar"></i>
                <span>Calendar</span>
            </a>
            <button class="bottom-nav add-btn" id="addSubBtn">
                <i class="fas fa-plus"></i>
            </button>
            <a href="stats.html" class="bottom-nav">
                <i class="fas fa-chart-simple"></i>
                <span>Stats</span>
            </a>
            <a href="more.html" class="bottom-nav">
                <i class="fas fa-ellipsis"></i>
                <span>More</span>
            </a>
        </nav>
    </div>

    <!-- Add Subscription Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <button class="text-btn" id="modalBackBtn" style="display:none;"><i class="fas fa-arrow-left"></i></button>
                <h2 id="modalTitle">Add Subscription</h2>
                <button class="text-btn" id="closeModal"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="step-content active" id="step1">
                    <button class="btn btn-outline btn-block" id="customSubBtn" style="margin-bottom: 16px;">
                        <i class="fas fa-plus"></i>
                        Create Custom
                    </button>
                    <div class="search-box">
                        <i class="fas fa-magnifying-glass"></i>
                        <input type="text" id="templateSearch" placeholder="Search services...">
                    </div>
                    <div class="category-pills" style="padding: 0 0 16px;">
                        <button class="pill active" data-category="all">All</button>
                        <button class="pill" data-category="entertainment">Entertainment</button>
                        <button class="pill" data-category="music">Music</button>
                        <button class="pill" data-category="productivity">Productivity</button>
                        <button class="pill" data-category="cloud">Cloud</button>
                        <button class="pill" data-category="gaming">Gaming</button>
                        <button class="pill" data-category="education">Education</button>
                        <button class="pill" data-category="fitness">Fitness</button>
                    </div>
                    <div class="templates-list" id="templatesList"></div>
                </div>
                <div class="step-content" id="step2" style="display:none;">
                    <div class="icon-selector" id="iconSelector">
                        <div class="selected-icon" id="iconPreview"><i class="fas fa-plus"></i></div>
                        <span>Tap to choose icon</span>
                    </div>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="subName" placeholder="e.g., Netflix">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Price</label>
                            <input type="number" id="subPrice" placeholder="0.00" step="0.01">
                        </div>
                        <div class="form-group">
                            <label>Currency</label>
                            <select id="currencySelect">
                                <option value="USD">$ USD</option>
                                <option value="EUR">€ EUR</option>
                                <option value="GBP">£ GBP</option>
                                <option value="JPY">¥ JPY</option>
                                <option value="AUD">A$ AUD</option>
                                <option value="CAD">C$ CAD</option>
                                <option value="INR">₹ INR</option>
                                <option value="KRW">₩ KRW</option>
                                <option value="SGD">S$ SGD</option>
                                <option value="BRL">R$ BRL</option>
                                <option value="MXN">$ MXN</option>
                                <option value="THB">฿ THB</option>
                                <option value="IDR">Rp IDR</option>
                                <option value="MYR">RM MYR</option>
                                <option value="PHP">₱ PHP</option>
                                <option value="VND">₫ VND</option>
                                <option value="NZD">NZ$ NZD</option>
                                <option value="SEK">kr SEK</option>
                                <option value="NOK">kr NOK</option>
                                <option value="DKK">kr DKK</option>
                                <option value="PLN">zł PLN</option>
                                <option value="CZK">Kč CZK</option>
                                <option value="HUF">Ft HUF</option>
                                <option value="TRY">₺ TRY</option>
                                <option value="ZAR">R ZAR</option>
                                <option value="AED">د.إ AED</option>
                                <option value="SAR">﷼ SAR</option>
                                <option value="TWD">NT$ TWD</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Billing Cycle</label>
                        <div class="cycle-options">
                            <button class="cycle-btn" data-cycle="daily">Daily</button>
                            <button class="cycle-btn" data-cycle="weekly">Weekly</button>
                            <button class="cycle-btn active" data-cycle="monthly">Monthly</button>
                            <button class="cycle-btn" data-cycle="yearly">Yearly</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="subCategory">
                            <option value="entertainment">Entertainment</option>
                            <option value="music">Music</option>
                            <option value="productivity">Productivity</option>
                            <option value="cloud">Cloud Storage</option>
                            <option value="gaming">Gaming</option>
                            <option value="education">Education</option>
                            <option value="fitness">Fitness</option>
                            <option value="news">News</option>
                            <option value="finance">Finance</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="subStartDate">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary btn-block" id="nextBtn">Continue</button>
            </div>
        </div>
    </div>

    <!-- Icon Picker Modal -->
    <div class="modal-overlay" id="iconModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Choose Icon</h2>
                <button class="text-btn" id="closeIconModal"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="search-box">
                    <i class="fas fa-magnifying-glass"></i>
                    <input type="text" id="iconSearch" placeholder="Search icons...">
                </div>
                <div class="icon-grid" id="iconGrid"></div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="text-btn" id="closeSettings"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="settings-list">
                    <div class="settings-item">
                        <div class="settings-info"><i class="fas fa-moon"></i><span>Dark Mode</span></div>
                        <label class="toggle"><input type="checkbox" id="darkModeToggle"><span class="toggle-slider"></span></label>
                    </div>
                    <div class="settings-item">
                        <div class="settings-info"><i class="fas fa-bell"></i><span>Notifications</span></div>
                        <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
                    </div>
                    <div class="settings-item">
                        <div class="settings-info"><i class="fas fa-dollar-sign"></i><span>Default Currency</span></div>
                        <span class="settings-value">USD</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Info Modal -->
    <div class="modal-overlay" id="infoModal">
        <div class="modal">
            <div class="modal-header">
                <h2>About</h2>
                <button class="text-btn" id="closeInfo"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <div class="about-content">
                    <div class="about-icon"><i class="fas fa-receipt"></i></div>
                    <h3>SubKeep</h3>
                    <p>Track your subscriptions and never miss a payment.</p>
                    <span class="version">Version 1.0.0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let calendarDate = new Date();
        let selectedCalendarDay = null;

        function renderCalendar() {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            document.getElementById('calendarMonth').textContent = formatMonthYear(calendarDate);

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrev = new Date(year, month, 0).getDate();
            const today = new Date();

            const billingDays = {};
            subscriptions.forEach(sub => {
                const d = new Date(sub.nextBilling);
                if (d.getFullYear() === year && d.getMonth() === month) {
                    const day = d.getDate();
                    if (!billingDays[day]) billingDays[day] = [];
                    billingDays[day].push(sub);
                }
            });

            let html = '';
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="calendar-day other-month">${daysInPrev - i}</div>`;
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
                const isSelected = selectedCalendarDay && selectedCalendarDay.getFullYear() === year && selectedCalendarDay.getMonth() === month && selectedCalendarDay.getDate() === d;
                const hasSub = billingDays[d];
                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';
                if (hasSub) classes += ' has-sub';
                html += `<div class="${classes}" data-day="${d}">${d}</div>`;
            }
            const totalCells = firstDay + daysInMonth;
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remaining; i++) {
                html += `<div class="calendar-day other-month">${i}</div>`;
            }

            document.getElementById('calendarDays').innerHTML = html;

            if (selectedCalendarDay && selectedCalendarDay.getFullYear() === year && selectedCalendarDay.getMonth() === month) {
                showDayDetail(selectedCalendarDay.getDate(), billingDays);
            } else {
                document.getElementById('dayDetail').style.display = 'none';
            }
        }

        function showDayDetail(day, billingDays) {
            const detail = document.getElementById('dayDetail');
            const subs = billingDays[day] || [];
            const date = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), day);

            document.getElementById('dayDetailTitle').textContent = subs.length > 0 ? `${subs.length} subscription${subs.length > 1 ? 's' : ''} due` : 'No subscriptions';
            document.getElementById('dayDetailDate').textContent = formatDateFull(date);

            if (subs.length === 0) {
                document.getElementById('dayDetailList').innerHTML = `
                    <div class="day-detail-empty">
                        <i class="fas fa-calendar-check" style="font-size:24px;margin-bottom:8px;display:block;"></i>
                        No payments scheduled for this day
                    </div>`;
            } else {
                document.getElementById('dayDetailList').innerHTML = subs.map(sub => `
                    <div class="day-detail-item">
                        <div class="sub-icon" style="background: ${sub.color}; width:36px; height:36px; border-radius:10px; font-size:14px;">
                            <i class="${sub.icon}"></i>
                        </div>
                        <div class="sub-info">
                            <div class="sub-name" style="font-size:14px;">${sub.name}</div>
                            <div class="sub-meta" style="font-size:12px;">${sub.category}</div>
                        </div>
                        <div class="sub-price">
                            <div class="sub-amount" style="font-size:14px;">${getSymbol(sub.currency)}${sub.price}</div>
                        </div>
                    </div>`).join('');
            }
            detail.style.display = 'block';
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCommon();
            renderCalendar();

            document.getElementById('calPrev').addEventListener('click', () => {
                calendarDate.setMonth(calendarDate.getMonth() - 1);
                selectedCalendarDay = null;
                renderCalendar();
            });
            document.getElementById('calNext').addEventListener('click', () => {
                calendarDate.setMonth(calendarDate.getMonth() + 1);
                selectedCalendarDay = null;
                renderCalendar();
            });
            document.getElementById('calendarDays').addEventListener('click', (e) => {
                const dayEl = e.target.closest('.calendar-day');
                if (dayEl && !dayEl.classList.contains('other-month')) {
                    const day = parseInt(dayEl.dataset.day);
                    selectedCalendarDay = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), day);
                    renderCalendar();
                }
            });
        });
    </script>
</body>
</html>
